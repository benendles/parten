<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Admin — Portale Automobilista</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:Arial,sans-serif;background:#f0f2f5;color:#222;min-height:100vh}

  /* ── Login screen ── */
  #login-screen{display:flex;align-items:center;justify-content:center;min-height:100vh}
  .login-box{background:#fff;border-radius:8px;padding:40px 36px;width:340px;box-shadow:0 4px 24px rgba(0,0,0,.12)}
  .login-box h1{font-size:1.2rem;color:#003087;margin-bottom:6px}
  .login-box p{font-size:.82rem;color:#666;margin-bottom:24px}
  .login-box input{width:100%;padding:9px 12px;border:1px solid #ccc;border-radius:4px;font-size:.9rem;margin-bottom:14px}
  .login-box input:focus{outline:none;border-color:#0066cc}
  .btn-primary{width:100%;padding:10px;background:#0066cc;color:#fff;border:none;border-radius:4px;font-size:.9rem;font-weight:700;cursor:pointer}
  .btn-primary:hover{background:#005bb0}
  .err-inline{color:#c0392b;font-size:.82rem;margin-top:8px;display:none}

  /* ── Admin shell ── */
  #admin-shell{display:none}
  header{background:#003087;color:#fff;padding:10px 24px;display:flex;align-items:center;justify-content:space-between}
  header h1{font-size:1rem;font-weight:700;letter-spacing:.3px}
  header button{background:rgba(255,255,255,.15);color:#fff;border:1px solid rgba(255,255,255,.3);border-radius:3px;padding:4px 14px;font-size:.8rem;cursor:pointer}
  header button:hover{background:rgba(255,255,255,.28)}
  .main{display:flex;height:calc(100vh - 46px)}

  /* ── Sidebar ── */
  .sidebar{width:300px;min-width:240px;background:#fff;border-right:1px solid #dde1e7;display:flex;flex-direction:column}
  .search-bar{padding:10px;border-bottom:1px solid #eee;display:flex;gap:6px}
  .search-bar input{flex:1;padding:7px 10px;border:1px solid #ccc;border-radius:4px;font-size:.85rem}
  .search-bar input:focus{outline:none;border-color:#0066cc}
  .search-bar button{padding:7px 11px;background:#0066cc;color:#fff;border:none;border-radius:4px;font-size:.82rem;cursor:pointer}
  .user-list{flex:1;overflow-y:auto}
  .user-item{padding:10px 14px;border-bottom:1px solid #f0f0f0;cursor:pointer;transition:background .12s}
  .user-item:hover{background:#f5f8ff}
  .user-item.active{background:#e8f0fe;border-left:3px solid #0066cc}
  .user-item .uname{font-weight:700;font-size:.87rem}
  .user-item .umeta{font-size:.74rem;color:#888;margin-top:2px}
  .no-users{padding:20px;text-align:center;color:#aaa;font-size:.84rem}

  /* ── Detail panel ── */
  .detail{flex:1;overflow-y:auto;padding:22px 26px}
  .detail-placeholder{display:flex;align-items:center;justify-content:center;height:100%;color:#bbb;font-size:.9rem}

  /* ── Cards ── */
  .card{background:#fff;border-radius:7px;padding:20px 22px;margin-bottom:16px;box-shadow:0 1px 6px rgba(0,0,0,.07)}
  .card h2{font-size:.9rem;font-weight:700;color:#003087;margin-bottom:14px;padding-bottom:8px;border-bottom:1px solid #eef0f4;display:flex;align-items:center;gap:8px}
  .form-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px 16px}
  label{display:block;font-size:.77rem;font-weight:700;color:#555;margin-bottom:3px}
  input.fld,select.fld{width:100%;padding:7px 10px;border:1px solid #ccc;border-radius:4px;font-size:.86rem;font-family:inherit}
  input.fld:focus,select.fld:focus{outline:none;border-color:#0066cc}
  input.fld[readonly]{background:#f7f7f7;color:#999;cursor:default}

  /* ── Category checkboxes ── */
  .cat-grid{display:flex;flex-wrap:wrap;gap:6px;margin-top:2px}
  .cat-cb{display:flex;align-items:center;gap:4px;background:#f5f8ff;border:1px solid #c8d8f8;border-radius:4px;padding:4px 10px;cursor:pointer;font-size:.82rem;font-weight:700;-webkit-user-select:none;user-select:none}
  .cat-cb input[type=checkbox]{width:14px;height:14px;accent-color:#0066cc;cursor:pointer}
  .cat-cb:has(input:checked){background:#0066cc;border-color:#0066cc;color:#fff}

  /* ── Buttons ── */
  .save-row{margin-top:12px;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
  .btn-save{padding:7px 20px;background:#2e7d32;color:#fff;border:none;border-radius:4px;font-size:.84rem;font-weight:700;cursor:pointer}
  .btn-save:hover{background:#1b5e20}
  .btn-del{padding:7px 16px;background:#c0392b;color:#fff;border:none;border-radius:4px;font-size:.82rem;font-weight:700;cursor:pointer}
  .btn-del:hover{background:#96281b}
  .btn-add{padding:7px 16px;background:#0066cc;color:#fff;border:none;border-radius:4px;font-size:.82rem;font-weight:700;cursor:pointer;display:flex;align-items:center;gap:5px}
  .btn-add:hover{background:#005bb0}
  .save-msg{font-size:.81rem;font-weight:700;display:none}
  .save-msg.ok{color:#2e7d32} .save-msg.bad{color:#c0392b}

  /* ── Vehicle block ── */
  .vehicle-block{border:1px solid #e0e4ea;border-radius:5px;padding:14px;margin-bottom:12px;background:#fafbfc}
  .vehicle-block h3{font-size:.82rem;font-weight:700;color:#444;margin-bottom:10px;display:flex;align-items:center;gap:6px}
  .badge{display:inline-block;padding:2px 9px;border-radius:10px;font-size:.72rem;font-weight:700;background:#e8f5e9;color:#2e7d32;font-family:monospace;letter-spacing:.04em}
  .new-vehicle-form{border:2px dashed #b0c4de;border-radius:6px;padding:16px;margin-top:10px;background:#f0f6ff}
  .new-vehicle-form h3{font-size:.83rem;font-weight:700;color:#0066cc;margin-bottom:12px}
  .section-label{font-size:.78rem;font-weight:700;color:#666;text-transform:uppercase;letter-spacing:.6px;margin:14px 0 8px;padding-top:10px;border-top:1px solid #eee}

  /* ── New-user form (sidebar) ── */
  .btn-new-user{padding:7px 11px;background:#2e7d32;color:#fff;border:none;border-radius:4px;font-size:.9rem;font-weight:700;cursor:pointer;line-height:1}
  .btn-new-user:hover{background:#1b5e20}
  #new-user-form{display:none;padding:12px;background:#f0f6ff;border-bottom:2px solid #b0c4de}
  .nu-title{font-size:.8rem;font-weight:700;color:#003087;margin-bottom:10px}
  .nu-grid{display:grid;gap:8px}
  .nu-label{font-size:.75rem;font-weight:700;color:#555;display:block;margin-bottom:2px}
  .nu-hint{font-weight:400;color:#999}
  .fld-sm{font-size:.84rem;padding:6px 9px}
  .fld-upper{text-transform:uppercase}
  .nu-actions{display:flex;align-items:center;gap:8px;margin-top:10px}
  .btn-save-sm{padding:6px 16px;font-size:.82rem}
  .btn-cancel{padding:6px 12px;border:1px solid #ccc;background:#fff;border-radius:4px;font-size:.8rem;cursor:pointer}
</style>
</head>
<body>

<!-- ── Login screen ───────────────────────────────────────────────────────── -->
<div id="login-screen">
  <div class="login-box">
    <h1>&#128274; Area Amministratore</h1>
    <p>Portale Automobilista — accesso riservato</p>
    <input type="password" id="adm-pwd" placeholder="Password amministratore"
           onkeydown="if(event.key==='Enter')doLogin()">
    <button type="button" class="btn-primary" onclick="doLogin()">Accedi</button>
    <div class="err-inline" id="login-err"></div>
  </div>
</div>

<!-- ── Admin shell ────────────────────────────────────────────────────────── -->
<div id="admin-shell">
  <header>
    <h1>&#9881; Admin — Portale Automobilista</h1>
    <button type="button" onclick="doLogout()">Esci</button>
  </header>
  <div class="main">

    <!-- Sidebar -->
    <div class="sidebar">
      <div class="search-bar">
        <input type="text" id="search-input" placeholder="Cerca per nome…"
               onkeydown="if(event.key==='Enter')searchUsers()">
        <button type="button" onclick="searchUsers()">Cerca</button>
        <button type="button" class="btn-new-user" onclick="toggleNewUserForm()" title="Aggiungi utente">&#43;</button>
      </div>

      <!-- New user inline form -->
      <div id="new-user-form">
        <p class="nu-title">&#43; Nuovo Utente</p>
        <div class="nu-grid">
          <div>
            <label class="nu-label" for="nu-firstName">Nome *</label>
            <input class="fld fld-sm" id="nu-firstName" placeholder="es. Mario">
          </div>
          <div>
            <label class="nu-label" for="nu-lastName">Cognome *</label>
            <input class="fld fld-sm" id="nu-lastName" placeholder="es. Rossi">
          </div>
          <div>
            <label class="nu-label" for="nu-email">Email <span class="nu-hint">(opzionale)</span></label>
            <input class="fld fld-sm" id="nu-email" type="email" placeholder="es. mario@esempio.it">
          </div>
          <div>
            <label class="nu-label" for="nu-taxId">Codice Fiscale <span class="nu-hint">(opzionale, auto se vuoto)</span></label>
            <input class="fld fld-sm fld-upper" id="nu-taxId" placeholder="es. RSSMRA80A01H501U">
          </div>
        </div>
        <div class="nu-actions">
          <button type="button" class="btn-save btn-save-sm" onclick="createUser()">&#10003; Crea</button>
          <button type="button" class="btn-cancel" onclick="toggleNewUserForm()">Annulla</button>
          <span class="save-msg" id="nu-save-msg"></span>
        </div>
      </div>

      <div class="user-list" id="user-list">
        <div class="no-users">Caricamento…</div>
      </div>
    </div>

    <!-- Detail -->
    <div class="detail" id="detail-panel">
      <div class="detail-placeholder">Seleziona un utente per modificare i dati</div>
    </div>
  </div>
</div>

<script>
const API = '/api/admin';
let adminToken = sessionStorage.getItem('adminToken');
let currentUserId = null;

const ALL_CATS = ['AM','A1','A2','A','B1','B','BE','C1','C1E','C','CE','D1','D1E','D','DE'];

// ── Login / logout ──────────────────────────────────────────────────────────
async function doLogin() {
  const pwd = document.getElementById('adm-pwd').value;
  const errEl = document.getElementById('login-err');
  errEl.style.display = 'none';
  try {
    const r = await fetch(API + '/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ password: pwd }),
    });
    const j = await r.json();
    if (!j.success) { errEl.textContent = j.message; errEl.style.display = 'block'; return; }
    adminToken = j.token;
    sessionStorage.setItem('adminToken', adminToken);
    showShell();
  } catch {
    errEl.textContent = 'Errore di connessione al server';
    errEl.style.display = 'block';
  }
}

function doLogout() {
  sessionStorage.removeItem('adminToken');
  adminToken = null;
  document.getElementById('admin-shell').style.display = 'none';
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('adm-pwd').value = '';
}

function authHdr() {
  return { 'Authorization': 'Bearer ' + adminToken, 'Content-Type': 'application/json' };
}

// ── Shell init ──────────────────────────────────────────────────────────────
function showShell() {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('admin-shell').style.display = 'block';
  loadUsers();
}

// ── User list ───────────────────────────────────────────────────────────────
async function loadUsers(q) {
  const ul = document.getElementById('user-list');
  ul.innerHTML = '<div class="no-users">Caricamento…</div>';
  const url = API + '/users' + (q ? '?q=' + encodeURIComponent(q) : '');
  try {
    const r = await fetch(url, { headers: authHdr() });
    if (r.status === 401) { doLogout(); return; }
    const j = await r.json();
    if (!j.data.length) { ul.innerHTML = '<div class="no-users">Nessun utente trovato</div>'; return; }
    ul.innerHTML = j.data.map(u => `
      <div class="user-item" id="li-${u.id}" onclick="loadUser('${u.id}')">
        <div class="uname">${esc(u.lastName)} ${esc(u.firstName)}</div>
        <div class="umeta">${esc(u.taxId)} &bull; ${esc(u.authMethod)}</div>
      </div>`).join('');
  } catch {
    ul.innerHTML = '<div class="no-users">Errore di caricamento</div>';
  }
}

function searchUsers() {
  const q = document.getElementById('search-input').value.trim();
  loadUsers(q || undefined);
}

// ── User detail ─────────────────────────────────────────────────────────────
async function loadUser(id) {
  document.querySelectorAll('.user-item').forEach(el => el.classList.remove('active'));
  const li = document.getElementById('li-' + id);
  if (li) li.classList.add('active');
  currentUserId = id;

  const panel = document.getElementById('detail-panel');
  panel.innerHTML = '<div class="detail-placeholder">Caricamento…</div>';
  try {
    const r = await fetch(API + '/users/' + id, { headers: authHdr() });
    if (r.status === 401) { doLogout(); return; }
    const j = await r.json();
    if (!j.success) { panel.innerHTML = '<div class="detail-placeholder">Errore</div>'; return; }
    renderDetail(j.data);
  } catch {
    panel.innerHTML = '<div class="detail-placeholder">Errore di connessione</div>';
  }
}

// ── Render detail panel ─────────────────────────────────────────────────────
function renderDetail(u) {
  const panel = document.getElementById('detail-panel');
  const activeCats = (u.licenseCategory || '').split(',').map(s => s.trim()).filter(Boolean);

  const catCheckboxes = ALL_CATS.map(c => `
    <label class="cat-cb">
      <input type="checkbox" name="cat" value="${c}" ${activeCats.includes(c) ? 'checked' : ''}>
      ${c}
    </label>`).join('');

  panel.innerHTML = `
    <!-- Dati personali & Patente -->
    <div class="card">
      <h2>&#128100; Dati Personali &amp; Patente</h2>
      <div class="form-grid">
        <div><label>Nome</label><input class="fld" id="u-firstName" value="${esc(u.firstName)}"></div>
        <div><label>Cognome</label><input class="fld" id="u-lastName" value="${esc(u.lastName)}"></div>
        <div><label>Email</label><input class="fld" id="u-email" value="${esc(u.email)}"></div>
        <div><label>Codice Fiscale</label><input class="fld" value="${esc(u.taxId)}" readonly></div>
        <div><label>N° Patente</label><input class="fld" id="u-licenseNumber" value="${esc(u.licenseNumber)}"></div>
        <div>
          <label>Punti Patente (0–30)</label>
          <input class="fld" id="u-licensePoints" type="number" min="0" max="30" value="${u.licensePoints}">
        </div>
        <div><label>Scadenza Patente (MM/YYYY)</label><input class="fld" id="u-licenseExpiry" value="${esc(u.licenseExpiry)}" placeholder="es. 06/2030"></div>
      </div>

      <div class="section-label">Categorie Patente</div>
      <div class="cat-grid" id="cat-grid">${catCheckboxes}</div>
      <p style="font-size:.74rem;color:#999;margin-top:6px">Seleziona tutte le categorie valide per questo utente</p>

      <div class="save-row">
        <button class="btn-save" onclick="saveUser()">&#10003; Salva dati personali</button>
        <span class="save-msg" id="user-save-msg"></span>
      </div>
    </div>

    <!-- Veicoli -->
    <div class="card">
      <h2>&#128663; Veicoli registrati</h2>
      <div id="vehicles-container">
        ${u.vehicles.length === 0
          ? '<p style="color:#aaa;font-size:.85rem;margin-bottom:10px">Nessun veicolo registrato.</p>'
          : u.vehicles.map(v => vehicleBlock(v)).join('')}
      </div>
      <button class="btn-add" onclick="showNewVehicleForm()">&#43; Aggiungi veicolo</button>
      <div id="new-vehicle-form" style="display:none" class="new-vehicle-form">
        <h3>Nuovo veicolo</h3>
        <div class="form-grid">
          <div><label>Targa</label><input class="fld" id="nv-plate" placeholder="es. AB123CD" style="text-transform:uppercase"></div>
          <div><label>Marca</label><input class="fld" id="nv-brand" placeholder="es. FIAT"></div>
          <div><label>Modello</label><input class="fld" id="nv-model" placeholder="es. PANDA"></div>
          <div><label>Classe Ambientale</label>
            <select class="fld" id="nv-env">
              ${['EURO1','EURO2','EURO3','EURO4','EURO5','EURO6','EURO6D'].map(e=>`<option value="${e}"${e==='EURO4'?' selected':''}>${e}</option>`).join('')}
            </select>
          </div>
          <div><label>Tipo Veicolo</label>
            <select class="fld" id="nv-type">
              ${['AUTOVEICOLO','MOTOVEICOLO','CICLOMOTORE','RIMORCHIO','AUTOBUS'].map(t=>`<option value="${t}">${t}</option>`).join('')}
            </select>
          </div>
        </div>
        <div class="save-row" style="margin-top:12px">
          <button class="btn-save" onclick="addVehicle()">&#10003; Aggiungi</button>
          <button onclick="document.getElementById('new-vehicle-form').style.display='none'"
                  style="padding:7px 16px;border:1px solid #ccc;background:#fff;border-radius:4px;font-size:.83rem;cursor:pointer">Annulla</button>
          <span class="save-msg" id="nv-save-msg"></span>
        </div>
      </div>
    </div>
  `;
}

function vehicleBlock(v) {
  return `
    <div class="vehicle-block" id="vblock-${v.id}">
      <h3>&#128663; <span class="badge">${esc(v.plate)}</span> &nbsp;${esc(v.brand)} ${esc(v.model)}</h3>
      <div class="form-grid">
        <div><label>Targa</label><input class="fld" id="v-plate-${v.id}" value="${esc(v.plate)}" style="text-transform:uppercase"></div>
        <div><label>Marca</label><input class="fld" id="v-brand-${v.id}" value="${esc(v.brand)}"></div>
        <div><label>Modello</label><input class="fld" id="v-model-${v.id}" value="${esc(v.model)}"></div>
        <div><label>Classe Ambientale</label>
          <select class="fld" id="v-env-${v.id}">
            ${['EURO1','EURO2','EURO3','EURO4','EURO5','EURO6','EURO6D'].map(e=>`<option value="${e}"${v.environmentalClass===e?' selected':''}>${e}</option>`).join('')}
          </select>
        </div>
        <div><label>Tipo Veicolo</label>
          <select class="fld" id="v-type-${v.id}">
            ${['AUTOVEICOLO','MOTOVEICOLO','CICLOMOTORE','RIMORCHIO','AUTOBUS'].map(t=>`<option value="${t}"${v.type===t?' selected':''}>${t}</option>`).join('')}
          </select>
        </div>
      </div>
      <div class="save-row">
        <button class="btn-save" onclick="saveVehicle('${v.id}')">&#10003; Salva</button>
        <button class="btn-del" onclick="deleteVehicle('${v.id}')">&#128465; Elimina</button>
        <span class="save-msg" id="v-save-msg-${v.id}"></span>
      </div>
    </div>`;
}

function showNewVehicleForm() {
  const f = document.getElementById('new-vehicle-form');
  f.style.display = f.style.display === 'none' ? 'block' : 'none';
  if (f.style.display === 'block') document.getElementById('nv-plate').focus();
}

// ── Save user ───────────────────────────────────────────────────────────────
async function saveUser() {
  const msg = document.getElementById('user-save-msg');
  msg.style.display = 'none';
  const checked = [...document.querySelectorAll('#cat-grid input[type=checkbox]:checked')].map(cb => cb.value);
  const body = {
    firstName:       document.getElementById('u-firstName').value,
    lastName:        document.getElementById('u-lastName').value,
    email:           document.getElementById('u-email').value,
    licenseNumber:   document.getElementById('u-licenseNumber').value,
    licensePoints:   document.getElementById('u-licensePoints').value,
    licenseExpiry:   document.getElementById('u-licenseExpiry').value,
    licenseCategory: checked.join(','),
  };
  try {
    const r = await fetch(API + '/users/' + currentUserId, {
      method: 'PUT', headers: authHdr(), body: JSON.stringify(body),
    });
    const j = await r.json();
    showMsg('user-save-msg', j.success, j.success ? 'Salvato!' : j.message);
    if (j.success) loadUsers(document.getElementById('search-input').value.trim() || undefined);
  } catch {
    showMsg('user-save-msg', false, 'Errore di connessione');
  }
}

// ── Save vehicle ────────────────────────────────────────────────────────────
async function saveVehicle(vid) {
  const body = {
    plate:             document.getElementById('v-plate-' + vid).value,
    brand:             document.getElementById('v-brand-' + vid).value,
    model:             document.getElementById('v-model-' + vid).value,
    environmentalClass: document.getElementById('v-env-' + vid).value,
    type:              document.getElementById('v-type-' + vid).value,
  };
  try {
    const r = await fetch(API + '/vehicles/' + vid, {
      method: 'PUT', headers: authHdr(), body: JSON.stringify(body),
    });
    const j = await r.json();
    showMsg('v-save-msg-' + vid, j.success, j.success ? 'Salvato!' : j.message);
  } catch {
    showMsg('v-save-msg-' + vid, false, 'Errore di connessione');
  }
}

// ── Delete vehicle ──────────────────────────────────────────────────────────
async function deleteVehicle(vid) {
  const block = document.getElementById('vblock-' + vid);
  const plate = document.getElementById('v-plate-' + vid)?.value || 'questo veicolo';
  if (!confirm(`Eliminare definitivamente il veicolo ${plate}?`)) return;
  try {
    const r = await fetch(API + '/vehicles/' + vid, { method: 'DELETE', headers: authHdr() });
    const j = await r.json();
    if (j.success && block) block.remove();
    else alert(j.message || 'Errore');
  } catch {
    alert('Errore di connessione');
  }
}

// ── Add vehicle ─────────────────────────────────────────────────────────────
async function addVehicle() {
  const plate = document.getElementById('nv-plate').value.trim().toUpperCase();
  const brand = document.getElementById('nv-brand').value.trim().toUpperCase();
  const model = document.getElementById('nv-model').value.trim().toUpperCase();
  if (!plate || !brand || !model) {
    showMsg('nv-save-msg', false, 'Targa, marca e modello sono obbligatori');
    return;
  }
  const body = {
    plate, brand, model,
    environmentalClass: document.getElementById('nv-env').value,
    type:               document.getElementById('nv-type').value,
  };
  try {
    const r = await fetch(API + '/users/' + currentUserId + '/vehicles', {
      method: 'POST', headers: authHdr(), body: JSON.stringify(body),
    });
    const j = await r.json();
    if (j.success) {
      // Re-load user detail to show the new vehicle properly
      document.getElementById('new-vehicle-form').style.display = 'none';
      loadUser(currentUserId);
    } else {
      showMsg('nv-save-msg', false, j.message);
    }
  } catch {
    showMsg('nv-save-msg', false, 'Errore di connessione');
  }
}

// ── New user ────────────────────────────────────────────────────────────────
function toggleNewUserForm() {
  const f = document.getElementById('new-user-form');
  const visible = f.style.display !== 'none';
  f.style.display = visible ? 'none' : 'block';
  if (!visible) document.getElementById('nu-firstName').focus();
}

async function createUser() {
  const firstName = document.getElementById('nu-firstName').value.trim();
  const lastName  = document.getElementById('nu-lastName').value.trim();
  if (!firstName || !lastName) {
    showMsg('nu-save-msg', false, 'Nome e Cognome sono obbligatori');
    return;
  }
  const body = {
    firstName,
    lastName,
    email:  document.getElementById('nu-email').value.trim() || undefined,
    taxId:  document.getElementById('nu-taxId').value.trim() || undefined,
  };
  try {
    const r = await fetch(API + '/users', {
      method: 'POST', headers: authHdr(), body: JSON.stringify(body),
    });
    const j = await r.json();
    if (j.success) {
      document.getElementById('nu-firstName').value = '';
      document.getElementById('nu-lastName').value  = '';
      document.getElementById('nu-email').value     = '';
      document.getElementById('nu-taxId').value     = '';
      toggleNewUserForm();
      await loadUsers(document.getElementById('search-input').value.trim() || undefined);
      loadUser(j.id);
    } else {
      showMsg('nu-save-msg', false, j.message);
    }
  } catch {
    showMsg('nu-save-msg', false, 'Errore di connessione');
  }
}

// ── Utility ─────────────────────────────────────────────────────────────────
function showMsg(id, ok, text) {
  const el = document.getElementById(id);
  if (!el) return;
  el.textContent = text;
  el.className = 'save-msg ' + (ok ? 'ok' : 'bad');
  el.style.display = 'inline';
  if (ok) setTimeout(() => { el.style.display = 'none'; }, 3000);
}

function esc(s) {
  return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Auto-login if session token exists ──────────────────────────────────────
if (adminToken) {
  fetch(API + '/users', { headers: authHdr() }).then(r => {
    if (r.ok) showShell();
    else { sessionStorage.removeItem('adminToken'); adminToken = null; }
  }).catch(() => {});
}
